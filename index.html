<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#F6F7FB">
<title>GoldenCRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --white:#fff;--bg:#F6F7FB;--bg2:#F0F1F7;
  --border:#E6E9EF;--border2:#D0D4E0;
  --text:#323338;--text2:#676879;--text3:#C3C6D4;--text4:#A1A4B5;
  --blue:#0073EA;--blue2:#579BFC;--blue3:#E6F0FF;
  --green:#00C875;--green2:#E6FAF3;
  --orange:#FDAB3D;--orange2:#FFF0D6;
  --red:#E2445C;--red2:#FFECEF;
  --purple:#A25DDC;--purple2:#F3EBFF;
  --brand:#FF3D57;
  --shadow-sm:0 1px 4px rgba(0,0,0,.08);
  --shadow:0 4px 16px rgba(0,0,0,.1);
  --shadow-lg:0 8px 32px rgba(0,0,0,.14);
  --r:6px;--r2:10px;
}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:'Figtree',sans-serif;color:var(--text);font-size:14px;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.app{display:flex;height:100vh;overflow:hidden}
.sb{width:220px;flex-shrink:0;background:var(--white);border-left:1px solid var(--border);display:flex;flex-direction:column;transition:width .25s;overflow:hidden}
.sb.mini{width:56px}
.sb-top{height:56px;flex-shrink:0;display:flex;align-items:center;padding:0 14px;gap:10px;border-bottom:1px solid var(--border)}
.sb-logo{display:flex;align-items:center;gap:9px;flex:1;overflow:hidden}
.sb-mark{width:32px;height:32px;flex-shrink:0;background:linear-gradient(135deg,var(--brand),var(--purple));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:#fff;box-shadow:0 2px 8px rgba(162,93,220,.3)}
.sb-name{font-size:15px;font-weight:800;color:var(--text);white-space:nowrap;letter-spacing:-.3px}
.sb-name span{color:var(--purple)}
.sb.mini .sb-name{display:none}
.sb-nav{flex:1;padding:12px 8px;overflow-y:auto;display:flex;flex-direction:column;gap:2px}
.sb-sec{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;padding:10px 10px 4px;white-space:nowrap}
.sb.mini .sb-sec{opacity:0}
.sb-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--r2);color:var(--text2);font-size:13.5px;font-weight:500;cursor:pointer;border:none;background:transparent;width:100%;text-align:right;font-family:'Figtree',sans-serif;transition:all .12s;white-space:nowrap;overflow:hidden}
.sb-item i{font-size:19px;flex-shrink:0}
.sb-item:hover{background:var(--bg);color:var(--text)}
.sb-item.on{background:var(--blue3);color:var(--blue);font-weight:700}
.sb-item.on i{color:var(--blue)}
.sb.mini .sb-item span{display:none}
.sb-bottom{padding:10px 8px;border-top:1px solid var(--border);flex-shrink:0}
.sb-user{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--r2);overflow:hidden}
.sb-av{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--brand));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.sb-uname{font-size:13px;font-weight:600;color:var(--text)}
.sb-urole{font-size:11px;color:var(--text4)}
.sb.mini .sb-utext{display:none}
.mini-btn{width:32px;height:32px;border-radius:var(--r);background:transparent;border:1px solid var(--border);color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .12s;flex-shrink:0}
.mini-btn:hover{border-color:var(--border2);color:var(--text2);background:var(--bg)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.hdr{height:56px;flex-shrink:0;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:12px}
.hdr-title{font-size:22px;font-weight:800;color:var(--text);letter-spacing:-.4px}
.hdr-badge{background:var(--bg2);color:var(--text2);font-size:12px;font-weight:700;padding:2px 8px;border-radius:20px}
.spacer{flex:1}
.search-wrap{position:relative;display:flex;align-items:center}
.search-wrap i{position:absolute;right:10px;color:var(--text3);font-size:16px;pointer-events:none}
.search-inp{background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r2);padding:7px 34px 7px 14px;color:var(--text);font-size:13.5px;font-family:'Figtree',sans-serif;width:220px;outline:none;transition:all .18s;font-weight:500}
.search-inp::placeholder{color:var(--text3)}
.search-inp:focus{border-color:var(--blue);background:var(--white);box-shadow:0 0 0 3px rgba(0,115,234,.1)}
.btn{display:inline-flex;align-items:center;gap:7px;padding:7px 16px;border-radius:var(--r2);font-size:13.5px;font-weight:700;font-family:'Figtree',sans-serif;cursor:pointer;border:none;transition:all .15s;white-space:nowrap}
.btn-blue{background:var(--blue);color:#fff;box-shadow:0 2px 8px rgba(0,115,234,.25)}
.btn-blue:hover{background:#0062c4}
.btn-red{background:var(--red);color:#fff;box-shadow:0 2px 8px rgba(226,68,92,.25)}
.btn-red:hover{background:#c4223b}
.btn-outline{background:transparent;color:var(--text2);border:1.5px solid var(--border)}
.btn-outline:hover{border-color:var(--border2);color:var(--text);background:var(--bg)}
.btn-icon{padding:7px;background:transparent;border:1.5px solid var(--border);color:var(--text3);border-radius:var(--r2)}
.btn-icon:hover{border-color:var(--border2);color:var(--text2);background:var(--bg)}
.content{flex:1;overflow-y:auto;background:var(--bg)}
.kpi-wrap{padding:20px 24px 0;display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:20px}
.kpi{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r2);padding:16px 18px;transition:all .18s;cursor:default}
.kpi:hover{border-color:var(--border2);box-shadow:var(--shadow-sm);transform:translateY(-1px)}
.kpi-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.kpi-icon{width:36px;height:36px;border-radius:var(--r2);display:flex;align-items:center;justify-content:center;font-size:18px}
.kpi-icon.blue{background:var(--blue3);color:var(--blue)}
.kpi-icon.green{background:var(--green2);color:var(--green)}
.kpi-icon.orange{background:var(--orange2);color:var(--orange)}
.kpi-icon.purple{background:var(--purple2);color:var(--purple)}
.kpi-icon.red{background:var(--red2);color:var(--red)}
.kpi-label{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.kpi-val{font-size:26px;font-weight:800;color:var(--text);letter-spacing:-.5px;line-height:1}
.kpi-sub{font-size:12px;color:var(--text4);margin-top:6px;font-weight:500}
.kpi-sub.up{color:var(--green)}
.board-hdr{padding:14px 24px;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap;position:sticky;top:0;z-index:10}
.view-tabs{display:flex;gap:2px;background:var(--bg);border-radius:var(--r2);padding:3px}
.vtab{background:transparent;border:none;color:var(--text2);padding:6px 14px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;font-family:'Figtree',sans-serif;display:flex;align-items:center;gap:6px;transition:all .12s}
.vtab.on{background:var(--white);color:var(--text);box-shadow:var(--shadow-sm)}
.fsel{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r2);padding:6px 12px;color:var(--text2);font-size:13px;font-weight:600;font-family:'Figtree',sans-serif;cursor:pointer;outline:none;transition:all .12s}
.fsel:hover,.fsel:focus{border-color:var(--blue);color:var(--text)}
.fsel option{background:white}
.board-wrap{overflow-x:auto}
.board-tbl{width:100%;border-collapse:collapse;min-width:560px}
.board-tbl thead th{background:var(--bg);padding:10px 16px;text-align:right;font-size:12px;font-weight:700;color:var(--text2);border-bottom:2px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none;position:sticky;top:0;z-index:5;transition:color .12s}
.board-tbl thead th:hover{color:var(--text)}
.board-tbl tbody tr{border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.board-tbl tbody tr:hover{background:#F9F9FC}
.board-tbl tbody tr.sel{background:var(--blue3)}
.board-tbl tbody tr.sel td:first-child{border-right:3px solid var(--blue)}
.board-tbl td{padding:12px 16px;vertical-align:middle;font-size:13.5px}
.board-tbl tfoot td{background:var(--bg);padding:10px 16px;font-size:12px;font-weight:700;color:var(--text2);border-top:2px solid var(--border)}
.td-acts{display:flex;gap:5px;opacity:0;transition:opacity .12s}
tr:hover .td-acts{opacity:1}
.cell-main{font-weight:600;color:var(--text);font-size:14px}
.cell-sub{font-size:12px;color:var(--text4);margin-top:2px;font-weight:500}
.av-wrap{display:flex;align-items:center;gap:10px}
.av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.pill{display:inline-flex;align-items:center;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;white-space:nowrap}
.p-new{background:#E6F2FF;color:#0073EA}
.p-contact{background:#F3EBFF;color:#A25DDC}
.p-proposal{background:#FFF0D6;color:#C97D00}
.p-negotiation{background:#E6FAF3;color:#007848}
.p-won{background:#E6FAF3;color:#00C875}
.p-lost{background:#FFECEF;color:#E2445C}
.p-active{background:#E6F2FF;color:#0073EA}
.p-vip{background:linear-gradient(90deg,#FFF0D6,#F3EBFF);color:#A25DDC;border:1px solid rgba(162,93,220,.2)}
.p-planning{background:#E6F2FF;color:#0073EA}
.p-review{background:#FFF0D6;color:#C97D00}
.p-done{background:#E6FAF3;color:#00C875}
.p-paused{background:#F5F5F8;color:#676879}
.p-potential{background:#F3EBFF;color:#A25DDC}
.p-inactive{background:#F5F5F8;color:#676879}
.p-exp-marketing{background:#FFF0D6;color:#C97D00}
.p-exp-software{background:#E6F2FF;color:#0073EA}
.p-exp-salary{background:#F3EBFF;color:#A25DDC}
.p-exp-office{background:#E6FAF3;color:#007848}
.p-exp-travel{background:#E6FAFA;color:#007878}
.p-exp-other{background:#F5F5F8;color:#676879}
.prio-chip{display:inline-flex;align-items:center;gap:5px;font-size:12.5px;font-weight:600}
.pd{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.ph{background:#E2445C}.pm{background:#FDAB3D}.pl{background:#00C875}
.prog-track{width:80px;height:6px;background:var(--bg2);border-radius:3px;overflow:hidden;display:inline-block;vertical-align:middle}
.prog-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#579BFC,#0073EA)}
.kanban{display:flex;gap:16px;padding:24px;overflow-x:auto;align-items:flex-start}
.kcol{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r2);min-width:230px;width:230px;flex-shrink:0}
.kcol-hd{padding:14px 14px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.kcol-cnt{background:var(--bg2);color:var(--text2);font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px}
.kcards{padding:10px;display:flex;flex-direction:column;gap:8px}
.kcard{background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r2);padding:14px;cursor:pointer;transition:all .18s}
.kcard:hover{border-color:var(--blue);box-shadow:var(--shadow-sm);background:var(--white);transform:translateY(-2px)}
.kc-n{font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px}
.kc-co{font-size:12px;color:var(--text4);margin-bottom:10px;font-weight:500}
.kc-foot{display:flex;justify-content:space-between;align-items:center}
.kc-v{font-size:13px;color:var(--blue);font-weight:800}
.kc-d{font-size:11px;color:var(--text3)}
.kadd{background:transparent;border:none;border-top:1px solid var(--border);color:var(--text3);font-size:13px;font-weight:600;padding:10px;width:100%;cursor:pointer;font-family:'Figtree',sans-serif;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .12s;border-radius:0 0 var(--r2) var(--r2)}
.kadd:hover{color:var(--blue);background:var(--blue3)}
.col-bar{height:3px;border-radius:2px 2px 0 0;margin:-1px -1px 0;width:calc(100% + 2px)}
.panel{width:0;flex-shrink:0;background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:width .28s cubic-bezier(.4,0,.2,1)}
.panel.open{width:340px}
.pnl-hd{padding:20px 20px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.pnl-av-row{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px}
.pnl-av{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800;flex-shrink:0}
.pnl-name{font-size:17px;font-weight:800;color:var(--text);margin-bottom:3px;letter-spacing:-.3px}
.pnl-co{font-size:13px;color:var(--text4);margin-bottom:8px;font-weight:500}
.pnl-scroll{flex:1;overflow-y:auto}
.pnl-sec{padding:16px 20px;border-bottom:1px solid var(--border)}
.pnl-sec-t{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px}
.pnl-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:10px}
.pnl-lbl{font-size:13px;color:var(--text2);font-weight:500}
.pnl-val{font-size:13.5px;color:var(--text);font-weight:600;text-align:left}
.pnl-val.blue{color:var(--blue);font-size:15px;font-weight:800}
.pnl-val.green{color:var(--green);font-weight:700}
.pnl-val.red{color:var(--red);font-weight:700}
.pnl-act{padding:16px 20px;border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0}
.notes-ta{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r2);padding:10px 13px;color:var(--text);font-size:13px;resize:none;outline:none;font-family:'Figtree',sans-serif;line-height:1.6;font-weight:500;transition:border-color .15s}
.notes-ta:focus{border-color:var(--blue);background:var(--white)}
.notes-ta::placeholder{color:var(--text3)}
.report-page{padding:24px;display:flex;flex-direction:column;gap:20px}
.report-card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r2);overflow:hidden}
.report-card-hd{padding:16px 20px 14px;border-bottom:1px solid var(--border)}
.report-card-title{font-size:15px;font-weight:800;color:var(--text);letter-spacing:-.3px;display:flex;align-items:center;gap:8px}
.report-card-sub{font-size:12px;color:var(--text4);margin-top:2px;font-weight:500}
.hero-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:12px;padding:20px}
.hc{border-radius:var(--r2);padding:16px 18px;border:1.5px solid transparent}
.hc.income{background:var(--green2);border-color:rgba(0,200,117,.25)}
.hc.expense{background:var(--red2);border-color:rgba(226,68,92,.2)}
.hc.profit-pos{background:var(--green2);border-color:rgba(0,200,117,.35)}
.hc.profit-neg{background:var(--red2);border-color:rgba(226,68,92,.3)}
.hc.neutral{background:var(--bg);border-color:var(--border)}
.hc-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;margin-bottom:8px;color:var(--text3)}
.hc.income .hc-label,.hc.profit-pos .hc-label{color:#007848}
.hc.expense .hc-label,.hc.profit-neg .hc-label{color:#aa1e35}
.hc-val{font-size:20px;font-weight:800;letter-spacing:-.5px}
.hc.income .hc-val,.hc.profit-pos .hc-val{color:var(--green)}
.hc.expense .hc-val,.hc.profit-neg .hc-val{color:var(--red)}
.hc.neutral .hc-val{color:var(--text2);font-size:17px}
.hc-sub{font-size:12px;margin-top:5px;font-weight:500;color:var(--text4)}
.hc.income .hc-sub,.hc.profit-pos .hc-sub{color:#007848}
.hc.expense .hc-sub,.hc.profit-neg .hc-sub{color:#aa1e35}
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.chart-card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r2);padding:20px}
.chart-title{font-size:15px;font-weight:800;color:var(--text);margin-bottom:3px;letter-spacing:-.3px}
.chart-sub{font-size:12px;color:var(--text4);margin-bottom:18px;font-weight:500}
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:170px;padding-bottom:26px;position:relative}
.bar-chart::after{content:'';position:absolute;bottom:26px;left:0;right:0;height:1px;background:var(--border)}
.bar-col{display:flex;flex-direction:column;align-items:center;flex:1;gap:3px;position:relative}
.bar-pair{display:flex;gap:2px;align-items:flex-end;width:100%}
.bar-seg{flex:1;border-radius:4px 4px 0 0;cursor:pointer;position:relative;min-height:3px;transition:opacity .15s}
.bar-seg:hover{opacity:.8}
.bar-seg:hover .bar-tt{display:block}
.bar-tt{display:none;position:absolute;bottom:calc(100% + 7px);left:50%;transform:translateX(-50%);background:var(--text);color:#fff;font-size:11px;font-weight:700;padding:5px 9px;border-radius:7px;white-space:nowrap;z-index:20;font-family:'Figtree',sans-serif;pointer-events:none;line-height:1.5}
.bar-tt::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:4px solid transparent;border-top-color:var(--text)}
.bar-lbl{font-size:10px;font-weight:600;color:var(--text4);position:absolute;bottom:0;text-align:center;width:100%}
.donut-wrap{display:flex;align-items:center;gap:20px}
.donut-legend{display:flex;flex-direction:column;gap:8px;flex:1}
.legend-item{display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:600}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.legend-lbl{color:var(--text);flex:1}
.legend-pct{color:var(--text4);font-weight:700;font-size:12px}
.overlay{display:none;position:fixed;inset:0;background:rgba(40,50,90,.45);backdrop-filter:blur(3px);z-index:1000;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--white);border-radius:var(--r2);width:560px;max-width:96vw;max-height:92vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:var(--shadow-lg);animation:popIn .2s cubic-bezier(.34,1.56,.64,1)}
@keyframes popIn{from{opacity:0;transform:scale(.93) translateY(12px)}}
.modal-hd{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.modal-title{font-size:17px;font-weight:800;color:var(--text);display:flex;align-items:center;gap:9px;letter-spacing:-.3px}
.modal-body{padding:20px 24px;display:flex;flex-direction:column;gap:14px;overflow-y:auto;flex:1}
.modal-ft{padding:14px 24px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;flex-shrink:0}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fg{display:flex;flex-direction:column;gap:5px}
.fl{font-size:12.5px;color:var(--text2);font-weight:700}
.fi,.fsl,.fta{background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r2);padding:9px 13px;color:var(--text);font-size:14px;font-weight:500;outline:none;font-family:'Figtree',sans-serif;width:100%;transition:all .15s}
.fi::placeholder{color:var(--text3)}
.fi:focus,.fsl:focus,.fta:focus{border-color:var(--blue);background:var(--white);box-shadow:0 0 0 3px rgba(0,115,234,.1)}
.fta{resize:vertical;min-height:70px;line-height:1.6}
.fsl option{background:white}
.vat-hint{font-size:12px;font-weight:700;margin-top:4px}

    el.style.cssText = 'position:fixed;inset:0;background:rgba(246,247,251,.96);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;font-family:Figtree,sans-serif';
    el.innerHTML = '<div style="width:42px;height:42px;border:3px solid #D0D4E0;border-top-color:#0073EA;border-radius:50%;animation:spin .7s linear infinite"></div><span style="font-size:14px;font-weight:700;color:#676879">טוען נתונים מהענן...</span>';
    document.body.appendChild(el);
  } else if (!on && el) {
    el.style.opacity = '0'; el.style.transition = 'opacity .3s';
    setTimeout(() => el.remove(), 300);
  }
}


function exportToCSV() {
  const items = D[tab] || [];
  if (!items.length) { toast('אין נתונים לייצוא', 'e'); return; }
  const excludeKeys = ['id','created_at'];
  const keys = Object.keys(items[0]).filter(k => !excludeKeys.includes(k));
  const hebrewHeaders = {
    name:'שם', company:'חברה / לקוח', status:'סטטוס', value:'ערך',
    priority:'עדיפות', date:'תאריך', owner:'בעלים', phone:'טלפון',
    email:'אימייל', notes:'הערות', contact:'איש קשר', city:'עיר',
    progress:'התקדמות %', vendor:'ספק', category:'קטגוריה',
    form_answer:'מה סימן בטופס', q_how_long:'כמה זמן עובד כך',
    q_how_worked:'איך עבד עד עכשיו', q_expectation:'ציפייה מפתרונות',
    retainer_plan:'מסלול ריטיינר', retainer_notes:'פירוט מסלול'
  };
  const header = keys.map(k => hebrewHeaders[k] || k).join(',');
  const rows = items.map(item =>
    keys.map(k => {
      const v = (item[k] ?? '').toString().replace(/"/g, '""');
      return v.includes(',') || v.includes('\n') ? `"${v}"` : v;
    }).join(',')
  );
  const bom = '\uFEFF'; // UTF-8 BOM for Excel/Sheets Hebrew support
  const csv = bom + [header, ...rows].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `goldencrm_${tab}_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  toast('הקובץ הורד — גרור ל-Google Sheets ✓', 's');
}

async function loadFromCloud() {
  showLoader(true);
  try {
    const sb = getSB();
    const [r1,r2,r3,r4] = await Promise.all([
      sb.from('leads').select('*').order('id'),
      sb.from('projects').select('*').order('id'),
      sb.from('clients').select('*').order('id'),
      sb.from('expenses').select('*').order('id'),
    ]);
    // Never wipe data on error
    if (r1.error || r2.error || r3.error || r4.error) {
      throw r1.error || r2.error || r3.error || r4.error;
    }
    D.leads = r1.data || [];
    D.projects = r2.data || [];
    D.clients = r3.data || [];
    D.expenses = r4.data || [];
    sv();
    console.log('Supabase OK — leads:', D.leads.length);
  } catch(e) {
    console.warn('Supabase load failed:', e.message || e);
    toast('שגיאת טעינה — נתונים מקומיים', 'e');
  }
  showLoader(false);
  go('leads');
}

async function saveItem() {
  const name = document.getElementById('fn')?.value.trim();
  if (!name) { toast('נדרש שם!', 'e'); return; }
  const v = parseFloat(document.getElementById('fv')?.value) || 0;
  const tbl = tab === 'expenses' ? 'expenses' : tab;
  let item;
  if (tab === 'expenses') {
    item = {
      name,
      vendor:   document.getElementById('fvn')?.value||'',
      category: document.getElementById('fcat')?.value||'אחר',
      value: v,
      date:  document.getElementById('fd')?.value||'',
      notes: document.getElementById('fno')?.value||''
    };
  } else {
    item = {
      name,
      company:  document.getElementById('fco')?.value||'',
      status:   document.getElementById('fs')?.value||CFG[tab].statuses[0],
      value: v,
      priority: document.getElementById('fp')?.value||'',
      date:     document.getElementById('fd')?.value||'',
      owner:    document.getElementById('fow')?.value||'רן',
      phone:    document.getElementById('fph')?.value||'',
      email:    document.getElementById('fem')?.value||'',
      contact:  document.getElementById('fct')?.value||'',
      city:     document.getElementById('fci')?.value||'',
      progress: parseInt(document.getElementById('fpr')?.value)||0,
      notes:    document.getElementById('fno')?.value||'',
      // leads-specific
      form_answer:  document.getElementById('fform')?.value||'',
      q_how_long:   document.getElementById('fq1')?.value||'',
      q_how_worked: document.getElementById('fq2')?.value||'',
      q_expectation:document.getElementById('fq3')?.value||'',
      // clients-specific
      retainer_plan:  document.getElementById('fretainer')?.value||'',
      retainer_notes: document.getElementById('fretainernotes')?.value||''
    };
  }
  try {
    const sb = getSB(); let saved;
    if (eId) {
      const {data, error} = await sb.from(tbl).update(item).eq('id', eId).select();
      if (error) throw error;
      saved = data[0] || {...item, id: eId};
      const arr = tab === 'expenses' ? D.expenses : D[tab];
      const x = arr.findIndex(i => i.id === eId);
      if (x >= 0) arr[x] = saved;
    } else {
      const {data, error} = await sb.from(tbl).insert(item).select();
      if (error) throw error;
      saved = data[0] || {...item, id: Date.now()};
      if (tab === 'expenses') D.expenses.push(saved); else D[tab].push(saved);
    }
    sv(); closeModal();
    if (tab === 'expenses') { renderExpensesKPI(); renderExpFilter(); renderExpMain(); }
    else { renderKPI(); renderBoardHdr(); renderMain(); }
    if (saved.id) openPanel(saved.id);
    toast(eId ? 'עודכן ✓' : 'נוסף ✓', 's');
  } catch(e) {
    console.error('Save error:', e);
    toast('שגיאה: ' + (e.message || ''), 'e');
  }
}

async function del(id) {
  if (!confirm('למחוק?')) return;
  const tbl = tab === 'expenses' ? 'expenses' : tab;
  try {
    const {error} = await getSB().from(tbl).delete().eq('id', id);
    if (error) throw error;
    if (tab === 'expenses') D.expenses = D.expenses.filter(i => i.id !== id);
    else D[tab] = D[tab].filter(i => i.id !== id);
    sv();
    if (sId === id) closePanel();
    if (tab === 'expenses') { renderExpensesKPI(); renderExpMain(); }
    else { renderKPI(); renderMain(); }
    toast('נמחק ✓', 's');
  } catch(e) { toast('שגיאה: ' + (e.message || ''), 'e'); }
}

function goMob(t) {
  go(t);
  document.querySelectorAll('.mob-nav-item').forEach(b => b.classList.remove('on'));
  const mb = document.getElementById('m-' + t);
  if (mb) mb.classList.add('on');
  document.querySelectorAll('.sb-item').forEach(b => b.classList.remove('on'));
  const sb2 = document.getElementById('t-' + t);
  if (sb2) sb2.classList.add('on');
}

document.getElementById('modal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeModal(); closePanel(); } });
loadFromCloud();
